<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED & Battery Time Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f4f6;
    padding: 12px;
}
.box {
    background: #ffffff;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
h2 {
    margin-top: 0;
    font-size: 18px;
}
label {
    font-weight: bold;
    display: block;
    margin-top: 8px;
}
input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}
button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
}
.result {
    margin-top: 10px;
    background: #eef7ff;
    padding: 10px;
    border-radius: 6px;
}
small {
    color: #555;
}
</style>
</head>

<body>

<!-- SECTION 1 -->
<div class="box">
<h2>1️⃣ LED Forward Voltage & Resistor</h2>

<label>Supply Voltage (Vs) – Volts</label>
<input type="number" id="vs" placeholder="Example: 5" step="0.1">

<label>LED Forward Voltage (Vf) – Volts</label>
<input type="number" id="vf" placeholder="Example: 3.4" step="0.1">

<label>LED Current (mA)</label>
<input type="number" id="ledCurrent" placeholder="Example: 20">

<button onclick="calcResistor()">Calculate Resistor</button>

<div class="result" id="resistorResult"></div>

<small>
Formula: R = (Vs − Vf) / I  
<br>Use next higher standard value (e.g. 80Ω → 82Ω or 100Ω)
</small>
</div>

<!-- SECTION 2 -->
<div class="box">
<h2>2️⃣ Battery Time Estimate</h2>

<label>Battery Capacity (mAh)</label>
<input type="number" id="batteryMah" placeholder="Example: 2000">

<label>LED Current (mA)</label>
<input type="number" id="batteryCurrent" placeholder="Same as above">

<button onclick="calcTime()">Estimate Time</button>

<div class="result" id="timeResult"></div>

<small>
Ideal time only.  
Real usage ≈ 60–70% of this value.
</small>
</div>

<script>
function calcResistor() {
    let Vs = parseFloat(document.getElementById("vs").value);
    let Vf = parseFloat(document.getElementById("vf").value);
    let I = parseFloat(document.getElementById("ledCurrent").value) / 1000;

    if (Vs <= Vf || I <= 0) {
        document.getElementById("resistorResult").innerHTML =
            "❌ Vs must be higher than Vf.";
        return;
    }

    let R = (Vs - Vf) / I;

    document.getElementById("resistorResult").innerHTML =
        "<b>Required Resistor:</b> " + R.toFixed(1) + " Ω";
}

function calcTime() {
    let mAh = parseFloat(document.getElementById("batteryMah").value);
    let I = parseFloat(document.getElementById("batteryCurrent").value);

    if (mAh <= 0 || I <= 0) {
        document.getElementById("timeResult").innerHTML =
            "❌ Enter valid values.";
        return;
    }

    let hours = mAh / I;
    let real = hours * 0.7;

    document.getElementById("timeResult").innerHTML =
        "<b>Ideal Time:</b> " + hours.toFixed(1) + " hours<br>" +
        "<b>Realistic Time:</b> ~" + real.toFixed(1) + " hours";
}
</script>

</body>
</html>
